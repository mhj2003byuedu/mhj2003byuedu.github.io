<!DOCTYPE html>
<html>
<head>
<title>Portal Dodge</title>
<style>
  body { text-align:center; font-family:Arial; background:#111; color:white; }
  canvas { background:#222; display:block; margin:auto; border:2px solid white; }
</style>
</head>
<body>

<h1>Portal Dodge</h1>
<p>Move with Arrow Keys or WASD. Avoid red blocks. Use blue portals to teleport. Press R to restart.</p>
<canvas id="game" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, portals, frame, gameOver;

function resetGame(){
  player = { x:240, y:460, size:20, speed:5 };
  obstacles = [];
  portals = [];
  frame = 0;
  gameOver = false;
  spawnPortals();
}

resetGame();

// controls
document.addEventListener("keydown", e => {
  if(gameOver && e.key.toLowerCase() === "r") {
    resetGame();
    return;
  }

  if(e.key === "ArrowLeft" || e.key === "a") player.x -= player.speed;
  if(e.key === "ArrowRight" || e.key === "d") player.x += player.speed;
  if(e.key === "ArrowUp" || e.key === "w") player.y -= player.speed;
  if(e.key === "ArrowDown" || e.key === "s") player.y += player.speed;
});

// spawn obstacle
function spawnObstacle(){
  obstacles.push({
    x: Math.random()*480,
    y: -20,
    size: 20,
    speed: 2 + Math.random()*2
  });
}

// spawn portals
function spawnPortals(){
  portals = [
    {x: Math.random()*450, y: 150},
    {x: Math.random()*450, y: 350}
  ];
}

// collision check
function hit(a,b){
  return a.x < b.x+20 && a.x+20 > b.x && a.y < b.y+20 && a.y+20 > b.y;
}

function update(){
  if(gameOver) return;

  frame++;
  if(frame % 60 === 0) spawnObstacle();
  if(frame % 600 === 0) spawnPortals();

  obstacles.forEach(o => o.y += o.speed);

  obstacles.forEach(o => {
    if(hit(player,o)) gameOver = true;
  });

  if(portals.length === 2){
    if(hit(player,portals[0])) {
      player.x = portals[1].x;
      player.y = portals[1].y;
    }
    else if(hit(player,portals[1])) {
      player.x = portals[0].x;
      player.y = portals[0].y;
    }
  }
}

function draw(){
  ctx.clearRect(0,0,500,500);

  // player
  ctx.fillStyle="lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // obstacles
  ctx.fillStyle="red";
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.size, o.size));

  // portals
  ctx.fillStyle="cyan";
  portals.forEach(p => ctx.fillRect(p.x, p.y, 20, 20));

  if(gameOver){
    ctx.fillStyle="white";
    ctx.font="36px Arial";
    ctx.fillText("GAME OVER", 130, 240);
    ctx.font="20px Arial";
    ctx.fillText("Press R to Retry", 170, 280);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
